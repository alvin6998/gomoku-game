<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- 設定畫面 -->
  <div id="setup-screen" class="screen active">
    <div style="margin-bottom:1.5rem;">
      <h1>⚫ 五子棋</h1>
      <p class="subtitle">人機對戰 — 先連成五子者獲勝</p>
    </div>
    <div class="card">
      <div class="field">
        <label>你的名字</label>
        <input type="text" id="pname" placeholder="請輸入名字" maxlength="12" />
        <div class="err" id="nerr"></div>
      </div>
      <div class="field">
        <label>難易度</label>
        <div class="diff-grid">
          <button class="diff-btn" data-d="1"><span class="dl">初學者</span><span class="dd">隨機落子</span></button>
          <button class="diff-btn sel" data-d="2"><span class="dl">普通</span><span class="dd">懂得攻防</span></button>
          <button class="diff-btn" data-d="3"><span class="dl">困難</span><span class="dd">深度搜尋</span></button>
        </div>
      </div>
      <button class="start-btn" id="sbtn">開始對局</button>
    </div>
  </div>

  <!-- 遊戲畫面 -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <span class="ptag on" id="tp">⚫ 玩家</span>
      <span class="tbox" id="clk">⏱ 00:00</span>
      <span class="ptag" id="tai">⚪ AI</span>
    </div>
    <canvas id="board"></canvas>
    <div class="sbar" id="sbar">輪到你落子</div>
  </div>

  <!-- 結果畫面 -->
  <div id="result-screen" class="screen">
    <div class="card" style="padding:2rem 1rem;">
      <div class="rbadge" id="rbadge"></div>
      <div class="rtitle" id="rtitle"></div>
      <div class="rsub" id="rsub"></div>
      <div class="srow">
        <div class="sitem"><div class="sv" id="stime">—</div><div class="sl">總時間</div></div>
        <div class="sitem"><div class="sv" id="smoves">—</div><div class="sl">總手數</div></div>
        <div class="sitem"><div class="sv" id="sdiff">—</div><div class="sl">難易度</div></div>
      </div>
      <button class="rbtn" id="replbtn">🔁 再來一局</button>
    </div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
